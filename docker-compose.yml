services:
  postgresql_db:
    image: postgres
    environment:
      POSTGRES_DB: postgres_database
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
    ports:
      - "5432:5432"
    volumes:
      - postgresql_data:/var/lib/postgresql

  redis:
    image: redis
    ports:
      - "6379:6379"

volumes:
  postgresql_data:
    name: "postgresql-data"
